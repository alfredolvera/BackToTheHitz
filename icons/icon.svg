<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Back to the Hitz icon</title>
  <desc id="desc">A neon time-travel badge with the letters HZ.</desc>
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#23d5ff" stop-opacity="0.45"/>
      <stop offset="0.48" stop-color="#0c143c"/>
      <stop offset="1" stop-color="#03030a"/>
    </radialGradient>
    <linearGradient id="bolt" x1="120" x2="390" y1="94" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffc107"/>
      <stop offset="0.52" stop-color="#ff9f1c"/>
      <stop offset="1" stop-color="#e73c7e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#23d5ff" stroke-width="12" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="158" fill="none" stroke="#ffc107" stroke-width="7" stroke-opacity="0.7" stroke-dasharray="38 18"/>
  <path d="M285 62 130 278h104l-25 172 173-236H270L285 62Z" fill="url(#bolt)" filter="url(#glow)"/>
  <text x="256" y="314" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="118" font-weight="900" fill="#fff" stroke="#03030a" stroke-width="8" paint-order="stroke" letter-spacing="-8">HZ</text>
</svg>
